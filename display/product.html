<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maison Logos - Product Preview</title>
  <link rel="stylesheet" href="store.css">
  <link rel="stylesheet" href="product.css">
</head>
<body class="product-page">
  <div class="cursor"></div>

  <main class="product-shell">
    <header class="product-header">
      <a class="brand" href="store.html">Maison Logos</a>
      <div class="header-actions">
        <a class="text-link" href="store.html">Back to Store</a>
      </div>
    </header>

    <section class="product-hero" id="product-hero">
      <div class="product-media">
        <div class="product-image-frame">
          <img id="product-image" alt="">
        </div>
      </div>
      <div class="product-info">
        <div class="product-badges">
          <span class="badge" id="discount-badge"></span>
          <span class="badge badge-light" id="shipping-badge"></span>
        </div>
        <h1 id="product-name"></h1>
        <div class="product-pricing">
          <span class="price" id="product-price"></span>
          <span class="old-price" id="product-old-price"></span>
        </div>
        <div class="product-rating" id="product-rating"></div>
        <p class="product-long" id="product-long"></p>
        <p class="product-short" id="product-short"></p>
        <div class="product-actions">
          <button class="primary" id="add-to-cart" type="button">Add to Cart</button>
          <button class="secondary" id="buy-now" type="button">Buy Now</button>
        </div>
      </div>
    </section>

    <section class="product-reviews">
      <h2>Client Notes</h2>
      <div class="reviews-grid" id="reviews-list"></div>
    </section>

    <section class="product-recommendations">
      <h2>Recommended for You</h2>
      <div class="products-grid" id="recommendations"></div>
    </section>
  </main>

  <script type="module" src="product.js"></script>
</body>
</html>
